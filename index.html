const GBO_MODEL = {
  gbo:   { slope:59285, intercept:453548 },
  screens: { slope:20.3, intercept:962 },
  distributionCosts: { perScreen:141.5, base:118023 },
  breakout: { standard:25/12, largeFootprint:7/3, threshold:2500 },
};

function projectTheatrical(spotifyFollowers) {
  const fM = spotifyFollowers / 1000000;
  const baseGBO = GBO_MODEL.gbo.slope * fM + GBO_MODEL.gbo.intercept;
  const screens = GBO_MODEL.screens.slope * fM + GBO_MODEL.screens.intercept;
  const distCost = GBO_MODEL.distributionCosts.perScreen * screens + GBO_MODEL.distributionCosts.base;
  const isLarge = screens >= GBO_MODEL.breakout.threshold;
  const bMult = isLarge ? GBO_MODEL.breakout.largeFootprint : GBO_MODEL.breakout.standard;
  return {
    baseGBO:     Math.round(baseGBO / 1000) * 1000,
    breakoutGBO: Math.round(baseGBO * bMult / 1000) * 1000,
    distCost:    Math.round(distCost / 1000) * 1000,
    screens:     Math.round(screens),
    bMult,
  };
}

const D2C_RATES = {
  high: { strong:0.0012, mid:0.0008, weak:0.0005 },
  mid:  { strong:0.0009, mid:0.0006, weak:0.0003 },
  low:  { strong:0.0006, mid:0.0004, weak:0.0002 },
};
const THEATER_RATES = { high:0.10, mid:0.07, low:0.05 };
const TOURING_TICKETS = { stadium:200000, arena:80000, theater:20000, club:5000, festival:30000, inactive:15000 };

function autoTouringTier(spotifyListeners, instagramFollowers) {
  const l = spotifyListeners, ig = instagramFollowers;
  if (l >= 50e6 || ig >= 20e6) return "stadium";
  if (l >= 15e6 || ig >= 5e6)  return "arena";
  if (l >= 3e6  || ig >= 1e6)  return "theater";
  if (l >= 500e3 || ig >= 200e3) return "club";
  return "inactive";
}

function autoMerchInfraScore(spotifyListeners, instagramFollowers, touringTier) {
  let score = 0;
  if (spotifyListeners >= 40e6) score += 35;
  else if (spotifyListeners >= 10e6) score += 25;
  else if (spotifyListeners >= 2e6) score += 15;
  else score += 5;
  if (instagramFollowers >= 10e6) score += 35;
  else if (instagramFollowers >= 2e6) score += 25;
  else if (instagramFollowers >= 500e3) score += 15;
  else score += 5;
  const ts = { stadium:30, arena:22, theater:14, club:8, festival:16, inactive:4 };
  score += ts[touringTier] || 4;
  return Math.min(100, score);
}

function projectMerch({ spotifyFollowers, spotifyListeners, touringTier, instagramFollowers, merchInfraScore, depthBand }) {
  const infraBand = merchInfraScore >= 80 ? "strong" : merchInfraScore >= 55 ? "mid" : "weak";
  const d2cBase = D2C_RATES[depthBand]?.[infraBand] || 0.0006;
  const tickets = TOURING_TICKETS[touringTier] || 15000;
  const scaleS = spotifyListeners>=40e6?85:spotifyListeners>=10e6?60:spotifyListeners>=2e6?38:20;
  const composite = (scaleS + (instagramFollowers>=5e6?72:instagramFollowers>=1e6?48:28) + merchInfraScore) / 3;
  const thTier = composite>=70?"high":composite>=50?"mid":"low";
  const thBase = THEATER_RATES[thTier];
  const base = { d2c:Math.round(spotifyFollowers*d2cBase),        theater:Math.round(tickets*thBase) };
  const high = { d2c:Math.round(spotifyFollowers*d2cBase*1.85),   theater:Math.round(tickets*thBase*1.6) };
  return {
    base: base.d2c + base.theater,
    high: high.d2c + high.theater,
    infraBand,
  };
}

function resolveArtistName(name) {
  return ARTIST_ALIASES[name.toLowerCase().trim()] || null;
}

function getCompStats(artistName) {
  const canonical = resolveArtistName(artistName);
  if (!canonical) return null;
  const rows = COMP_ALBUMS.filter(a => a.artist === canonical);
  if (!rows.length) return null;
  const lpVals = rows.map(r => r.lp).filter(v => v != null).sort((a,b)=>a-b);
  const cdVals = rows.map(r => r.cd).filter(v => v != null).sort((a,b)=>a-b);
  const mid = arr => arr[Math.floor(arr.length/2)];
  const vp = lpVals.length >= 2 ? { base: lpVals[Math.floor(lpVals.length*0.25)] || lpVals[0], high: lpVals[Math.floor(lpVals.length*0.75)] || lpVals[lpVals.length-1] } : { base: lpVals[0]||0, high: lpVals[0]||0 };
  const cp = cdVals.length >= 2 ? { base: cdVals[Math.floor(cdVals.length*0.25)] || cdVals[0], high: cdVals[Math.floor(cdVals.length*0.75)] || cdVals[cdVals.length-1] } : { base: cdVals[0]||0, high: cdVals[0]||0 };
  const cassBase = Math.max(500, Math.min(10000, Math.round(vp.base * 0.03 / 100) * 100));
  const cassHigh = Math.max(500, Math.min(10000, Math.round(vp.high * 0.07 / 100) * 100));
  return {
    vinyl:    vp,
    cd:       cp,
    cassette: { base: cassBase, high: cassHigh },
    source: "comp",
    albumCount: rows.length,
    canonicalName: canonical,
  };
}

// -- Album projection: regression-based fallback ------------------
// Fitted from 59 post-2015 Luminate albums (log-log OLS):
//   vinyl = 5.661 x sod^0.4586   R2=0.41
//   cd    = 4.144 x sod^0.4774   R2=0.52
// SOD estimated from monthly listeners:
//   base = listeners x 14 (p25 of observed multipliers)
//   high = listeners x 35 (p75 of observed multipliers)
// Residual bands applied: base x0.7, high x1.8 (vinyl) / x1.75 (cd)
function projectAlbumSales(spotifyListeners, artistName) {
  // Try comp dataset first
  const comp = getCompStats(artistName || "");
  if (comp) return { ...comp };

  // Regression fallback
  const sodBase = spotifyListeners * 14;
  const sodHigh = spotifyListeners * 35;
  const vBase = Math.round(5.661 * Math.pow(sodBase, 0.4586) * 0.70 / 100) * 100;
  const vHigh = Math.round(5.661 * Math.pow(sodHigh, 0.4586) * 1.80 / 100) * 100;
  const cBase = Math.round(4.144 * Math.pow(sodBase, 0.4774) * 0.75 / 100) * 100;
  const cHigh = Math.round(4.144 * Math.pow(sodHigh, 0.4774) * 1.75 / 100) * 100;
  const cassBase = Math.max(500, Math.min(10000, Math.round(vBase * 0.03 / 100) * 100));
  const cassHigh = Math.max(500, Math.min(10000, Math.round(vHigh * 0.07 / 100) * 100));
  return {
    vinyl:    { base: vBase,     high: vHigh },
    cd:       { base: cBase,     high: cHigh },
    cassette: { base: cassBase,  high: cassHigh },
    source: "regression",
    albumCount: 0,
    canonicalName: null,
  };
}

function projectStreams(spotifyListeners) {
  // SOD multiplier p25/p75 from comp data, converted to stream-equivalent
  const sodBase = spotifyListeners * 14;
  const sodHigh = spotifyListeners * 35;
  return { base: Math.round(sodBase * 0.7 / 1e6) * 1e6, high: Math.round(sodHigh * 1.0 / 1e6) * 1e6 };
}

const DR = {

const TOTAL_STANDARD_BUDGET =

const trmPts = (ba) => Math.max(0, 100 - 50 - ba);
function glasshausFee(ntc, r) {
  return Math.min(ntc,r.glasshausTier1Cap)*r.glasshausFee1
    + Math.min(Math.max(0,ntc-r.glasshausTier1Cap),r.glasshausTier2Cap-r.glasshausTier1Cap)*r.glasshausFee2
    + Math.max(0,ntc-r.glasshausTier2Cap)*r.glasshausFee3;
}
function camaFee(ntc, r) {
  return Math.min(ntc,r.camaTier1Cap)*r.camaFee1
    + Math.min(Math.max(0,ntc-r.camaTier1Cap),r.camaTier2Cap-r.camaTier1Cap)*r.camaFee2
    + Math.max(0,ntc-r.camaTier2Cap)*r.camaFee3;
}
function run(s, r, budgetPct=1.0) {
  // -- Setup --------------------------------------------------------
  r = {...DR, ...r};
  s = {...s};
  ["vinyl","cd","cassette","gbo","theatDistCost","pa","streamingSale","streams","merchUnits","artistFee","orchardDrawdown"].forEach(k=>{ s[k]=Number(s[k])||0; });
  const sc = (v) => (Number(v)||0) * budgetPct;
  const wV=Math.floor(s.vinyl*r.wholesaleShare),   dV=s.vinyl-wV;
  const wC=Math.floor(s.cd*r.wholesaleShare),       dC=s.cd-wC;
  const wK=Math.floor((s.cassette||0)*r.wholesaleShare), dK=(s.cassette||0)-wK;

  // -- GROSS REVENUE PER CORRIDOR -----------------------------------
  const gT  = s.gbo;
  const gS  = s.streamingSale;
  const gD  = s.streams * r.revenuePerStream;
  const gW  = wV*r.vinylMSRP*r.wholesaleDiscount + wC*r.cdMSRP*r.wholesaleDiscount + wK*r.cassetteMSRP*r.wholesaleDiscount;
  const gDC = dV*r.vinylMSRP + dC*r.cdMSRP + dK*r.cassetteMSRP;
  const gM  = s.merchUnits * r.merchASP;
  const tG  = gT + gS + gD + gW + gDC + gM;

  // -- NTC (NET TO CAMA)  --  verified against V6 Excel ---------------
  // Theatrical: GBO -> exhibitor take -> distributor net of costs -> Glasshaus 50%
  const theatNetProfit = Math.max(0, gT*(1-r.exhibitorTake) - s.theatDistCost - (s.pa ?? s.theatDistCost));
  const tNC = theatNetProfit * (1-r.distributorTake);

  // Streaming: full sale price enters NTC (Orchard dist fee & drawdown come AFTER GH fee)
  const ntcStream = gS;

  // Digital & Wholesale: gross - label royalty(12%) - Orchard dist fee(20%) - Orchard mktg drawdown
  // Orchard drawdown split proportionally between dig and whl by gross revenue
  const orchD = s.orchardDrawdown || 0;
  const dr = (gD + gW) > 0 ? gD / (gD + gW) : 0.5;
  const orchDDDig = orchD * dr;
  const orchDDWhl = orchD * (1 - dr);
  const labRoyRate = r.royaltyTopLine !== false ? r.labelRoyalty : 0;  // 0 when toggle OFF
  const dNC_raw = gD  - gD*labRoyRate  - gD*r.orchardFee  - orchDDDig;
  const wNC_raw = gW  - gW*labRoyRate  - gW*r.orchardFee  - orchDDWhl;
  const dNC = Math.max(0, dNC_raw);   // clamp  --  drawdown can exceed channel; excess is unrecoverable
  const wNC = Math.max(0, wNC_raw);

  // D2C Physical: gross - label royalty(12%) - Mainfactor mgmt fee(15%)
  const dcNC = gDC - gDC*labRoyRate - gDC*r.mainfactorFee;

  // Merch: gross - Mainfactor mgmt fee(15%)
  const mNC = gM - gM*r.mainfactorFee;

  // -- CAMA FEE  --  aggregate step-down on sum of all positive NTCs ---
  const tNTC = [tNC, ntcStream, dNC, wNC, dcNC, mNC].reduce((a,v) => a + Math.max(0,v), 0);
  const cf = camaFee(tNTC, r);

  // CAMA allocated proportionally to each positive-NTC corridor
  const ntcCh = [tNC, ntcStream, dNC, wNC, dcNC, mNC];
  const camaC = ntcCh.map(v => tNTC > 0 ? cf * (Math.max(0,v) / tNTC) : 0);

  // -- SALES AGENT FEE  --  streaming only, computed on streaming net-of-CAMA --
  const camaStreamShare = camaC[1];
  const sf  = (ntcStream - camaStreamShare) * r.salesAgentFee;
  const saE = r.salesAgentExpenses;

  // -- NET TO GLASSHAUS per corridor --------------------------------
  // Each corridor's contribution to the GH fee base
  const ntgh = [
    Math.max(0, tNC)  - camaC[0],                          // Theatrical
    ntcStream - camaStreamShare - sf - saE,                 // Streaming (post-CAMA, post-SA)
    dNC       - camaC[2],                                   // Digital
    wNC       - camaC[3],                                   // Wholesale
    Math.max(0, dcNC) - camaC[4],                          // D2C
    Math.max(0, mNC)  - camaC[5],                          // Merch
  ];
  const totalNtGH = ntgh.reduce((a,v) => a + Math.max(0,v), 0);

  // -- GLASSHAUS FEE  --  aggregate step-down: 5% on <=$4M, 3% flat above $4M --
  // Tier 3 (1%) only kicks in for very large totals above glasshausTier2Cap
  // Verified against V6: no 1% tier within the tested range (<=$6.5M NtGH)
  const gf = glasshausFee(totalNtGH, r);

  // GH allocated proportionally: each corridor x (gf / total5pctRef)
  // where total5pctRef = each corridor's NtGH x 5%  --  this ratio gives correct per-corridor amount
  const ref5 = ntgh.map(v => Math.max(0,v) * 0.05);
  const tot5 = ref5.reduce((a,v) => a+v, 0);
  const ghC  = ref5.map(v => tot5 > 0 ? gf * (v / tot5) : 0);

  // -- COGs  --  only excess above budgeted mfg costs (budget is in production budget / investor principal) --
  // Album: (actual - budgeted) split 50/50 between wholesale and D2C
  //        if budgeted > actual, no deduction (surplus stays in budget, not returned here)
  const albumMfgTotal    = s.vinyl*r.vinylCOG + s.cd*r.cdCOG + (s.cassette||0)*r.cassetteCOG;
  const albumCOGPerCh    = Math.max(0, (albumMfgTotal - sc(r.budgetAlbumMfg)) / 2);
  // Merch: if actual > budgeted, deduct excess from merch NTI
  //        if budgeted > actual, SURPLUS flows positively to merch NTI (= budget overage returned)
  const merchMfgTotal    = (s.merchUnits||0) * r.merchCOG;
  const merchCOGNet      = sc(r.budgetMerchMfg) - merchMfgTotal;  // positive = surplus, negative = overrun
  const merchCOGDeducted = -Math.min(0, merchCOGNet);             // overrun amount (positive when excess)
  const merchCOGSurplus  = Math.max(0, merchCOGNet);              // surplus amount (positive when under budget)

  // -- POST-GH MARKETING DEDUCTION (new placeholder row) -----------
  // Applied AFTER the Glasshaus fee to dig/whl/d2c/merch corridors equally
  // = max(0, neededMktg - budgetMarketing - orchardDrawdown) / 4
  // neededMktg = (grossDig + grossWhl + grossD2C + grossMerch) / targetROAS
  const mktgGrossBase = gD + gW + gDC + gM;
  const neededMktg    = mktgGrossBase / (r.targetROAS || 5);
  const postGhMktgRemainder = Math.max(0, neededMktg - sc(r.budgetMarketing) - orchD);
  const postGhMktgPerCh     = postGhMktgRemainder / 4;  // applied equally to dig, whl, d2c, merch

  // -- PER-CHANNEL NTI (Net To Investors) --------------------------
  // Each channel floored at 0  --  surplus budget or COG never creates negative investor flows
  const ntis = {
    theat:  Math.max(0, Math.max(0,tNC)   - camaC[0] - ghC[0]),
    stream: Math.max(0, ntcStream - camaStreamShare - sf - saE - ghC[1]),
    dig:    Math.max(0, dNC  - camaC[2] - ghC[2] - postGhMktgPerCh),
    whl:    Math.max(0, wNC  - camaC[3] - ghC[3] - albumCOGPerCh - postGhMktgPerCh),
    d2c:    Math.max(0, Math.max(0,dcNC)  - camaC[4] - ghC[4] - albumCOGPerCh - postGhMktgPerCh),
    merch:  Math.max(0, Math.max(0,mNC)   - camaC[5] - ghC[5] + merchCOGSurplus - merchCOGDeducted - postGhMktgPerCh),
  };
  const nti = Object.values(ntis).reduce((a,v) => a+v, 0);

  // -- PRODUCTION BUDGET & INVESTOR WATERFALL -----------------------
  const tCOG = albumMfgTotal + merchMfgTotal;
  const pb   = sc(r.budgetATL) + s.artistFee + sc(r.budgetBTL) + sc(r.budgetPost) + sc(r.budgetDesign)
             + sc(r.budgetAlbumMfg) + sc(r.budgetMerchMfg) + sc(r.budgetMarketing) + sc(r.budgetMgmtExpenses);
  const ip   = pb;
  const iprem = ip * r.investorPremiumRate;
  const aTRM = Math.max(0, nti - r.trmDeferral - r.trmPremium);
  const tp   = trmPts(r.backendArtist);
  const np   = Math.max(0, aTRM - ip - iprem);
  const ib   = np * 0.50;
  const ab   = np * (r.backendArtist / 100);
  const tb   = np * (tp / 100);
  const tir  = Math.min(aTRM, ip + iprem + ib);
  const roi  = ip > 0 ? (tir - ip) / ip : 0;
  const trafPA = s.pa ?? s.theatDistCost ?? 0;
  const totalMarketing = sc(r.budgetMarketing) + orchD + trafPA;
  const roas = totalMarketing > 0 ? mktgGrossBase / totalMarketing : 0;

  const N = (v) => isNaN(v) || !isFinite(v) ? 0 : v;
  return {
    totalGross:N(tG), totalNTC:N(tNTC), netToInvestors:N(nti), totalInvestorReturn:N(tir), investorROI:N(roi),
    investorPrincipal:N(ip), investorPremium:N(iprem), investorBackend:N(ib), netProceeds:N(np),
    totalArtistIncome:N(s.artistFee + ab), totalTRMReturn:N(r.trmDeferral + r.trmPremium + tb),
    totalFees:N(cf + sf + saE + gf), totalCOGs:N(tCOG), productionBudget:N(pb),
    trmDeferred:N(r.trmDeferral), trmPremiumAmt:N(r.trmPremium), trmBackend:N(tb), trmBackendPts:N(tp),
    artistBackend:N(ab), camaFeeAmt:N(cf), glasshausFeeAmt:N(gf), salesAgentFeeAmt:N(sf),
    labelRoyaltyBackend:N(r.royaltyTopLine===false ? ab * r.labelRoyalty : 0),
    royaltyTopLine: r.royaltyTopLine !== false,
    orchDDDig:N(orchDDDig), orchDDWhl:N(orchDDWhl),
    totalMarketing:N(totalMarketing), roas:N(roas), neededMktg:N(neededMktg), targetROAS:r.targetROAS||5,
    postGhMktgRemainder:N(postGhMktgRemainder), postGhMktgPerCh:N(postGhMktgPerCh),
    albumCOGPerCh:N(albumCOGPerCh), albumMfgActual:N(albumMfgTotal),
    merchCOGDeducted:N(merchCOGDeducted), merchCOGSurplus:N(merchCOGSurplus), merchMfgActual:N(merchMfgTotal),
    budgetLines:{atl:sc(r.budgetATL),btl:sc(r.budgetBTL),post:sc(r.budgetPost),design:sc(r.budgetDesign),albumMfg:sc(r.budgetAlbumMfg),merchMfg:sc(r.budgetMerchMfg),marketing:sc(r.budgetMarketing),mgmt:sc(r.budgetMgmtExpenses)},
    revenueBreakdown:[
      {name:"Theatrical",     gross:N(gT),  net:N(ntis.theat)},
      {name:"Streaming Sale", gross:N(gS),  net:N(ntis.stream)},
      {name:"Digital Streams",gross:N(gD),  net:N(ntis.dig)},
      {name:"Wholesale",      gross:N(gW),  net:N(ntis.whl)},
      {name:"D2C Physical",   gross:N(gDC), net:N(ntis.d2c)},
      {name:"Merch",          gross:N(gM),  net:N(ntis.merch)},
    ],
    ntis:{theat:N(ntis.theat),stream:N(ntis.stream),dig:N(ntis.dig),whl:N(ntis.whl),d2c:N(ntis.d2c),merch:N(ntis.merch)},
    // expose intermediates for BackendTab
    _tNC:N(tNC), _ntcStream:N(ntcStream), _dNC:N(dNC), _wNC:N(wNC), _dcNC:N(dcNC), _mNC:N(mNC),
    _camaC:camaC, _ghC:ghC, _ntgh:ntgh, _sf:N(sf), _saE:N(saE), _cf:N(cf),
    _gT:N(gT),_gS:N(gS),_gD:N(gD),_gW:N(gW),_gDC:N(gDC),_gM:N(gM),
    _orchDDDig:N(orchDDDig),_orchDDWhl:N(orchDDWhl),
    _labRoyDig:N(gD*labRoyRate),_labRoyWhl:N(gW*labRoyRate),_labRoyD2C:N(gDC*labRoyRate),
    _orchDistFeeDig:N(gD*r.orchardFee),_orchDistFeeWhl:N(gW*r.orchardFee),
    _mfD2C:N(gDC*r.mainfactorFee),_mfMerch:N(gM*r.mainfactorFee),
    _theatNetProfit:N(theatNetProfit),_distShare:N(theatNetProfit*r.distributorTake),
  };
}

// -- Formatting ---------------------------------------------------
const fmtD = (n) => {
  if (n===null||n===undefined) return " -- ";
  const a=Math.abs(n), neg=n<0;
  let s = a>=1e6?"$"+(a/1e6).toFixed(2)+"M":a>=1e3?"$"+(a/1e3).toFixed(0)+"K":"$"+a.toFixed(0);
  return neg?`(${s})`:s;
};
const fmtN = (n) => n==null?" -- ":Number(n).toLocaleString("en-US");
const fmtPct = (n) => (n*100).toFixed(1)+"%";
const fmtShort = (n) => {
  if (!n&&n!==0) return " -- ";
  const a=Math.abs(n);
  if (a>=1e9) return (n/1e9).toFixed(2)+"B";
  if (a>=1e6) return (n/1e6).toFixed(1)+"M";
  if (a>=1e3) return (n/1e3).toFixed(0)+"K";
  return String(n);
};

// -- Tooltip ------------------------------------------------------
// Uses viewport-fixed positioning so it can never be clipped by parent overflow
function Tip({ id }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos]   = useState({ top:0, left:0 });
  const btnRef = useRef(null);
  const boxRef = useRef(null);

  const toggle = (e) => {
    e.stopPropagation();
    if (!open && btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      // Place below by default; if too low, flip above
      const boxH = 140; // rough estimate
      const above = (r.bottom + boxH + 20) > window.innerHeight;
      const top = above ? r.top - boxH - 6 : r.bottom + 6;
      setPos({ top, left: Math.min(Math.max(4, r.left), window.innerWidth - 284) });
    }
    setOpen(o => !o);
  };

  useEffect(() => {
    if (!open) return;
    const close = (e) => {
      if (btnRef.current && !btnRef.current.contains(e.target) &&
          boxRef.current  && !boxRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);

  if (!TIPS[id]) return null;
  return (
    <span style={{ display:"inline-flex", alignItems:"center" }}>
      <button ref={btnRef} onClick={toggle}
        style={{ background:"none", border:"none", cursor:"pointer", padding:"0 0 0 5px", color:open?T.gold:T.textFaint, fontSize:13, lineHeight:1, fontFamily:MN }}>?</button>
      {open && (
        <div ref={boxRef} style={{ position:"fixed", top:pos.top, left:pos.left, zIndex:9999, background:T.bg, border:`1px solid ${T.goldBorder}`, borderRadius:6, padding:"12px 14px", width:270, boxShadow:"0 8px 28px rgba(0,0,0,0.14)", fontSize:16, color:T.textMid, fontFamily:SS, lineHeight:1.65 }}>
          {TIPS[id]}
        </div>
      )}
    </span>
  );
}

// -- Single editable number ---------------------------------------
function NumField({ label, tipId, value, onChange, note, prefix="", estimated=false }) {
  const [editing, setEditing] = useState(false);
  const [raw, setRaw] = useState("");
  const commit = () => {
    const n = Number(String(raw).replace(/[^0-9.-]/g,""));
    if (!isNaN(n) && n >= 0) onChange(n);
    setEditing(false);
  };
  return (
    <div style={{ marginBottom:14 }}>
      {label && <FL tipId={tipId}>{label}</FL>}
      {editing ? (
        <input autoFocus value={raw} onChange={e=>setRaw(e.target.value)}
          onBlur={commit} onKeyDown={e=>{ if(e.key==="Enter") commit(); if(e.key==="Escape") setEditing(false); }}
          style={{ width:"100%", padding:"5px 8px", background:T.goldBg, border:`1px solid ${T.goldBorder}`, borderRadius:4, color:T.gold, fontFamily:MN, fontSize:13, outline:"none", boxSizing:"border-box" }}/>
      ) : (
        <div onClick={() => { setRaw(String(value||"")); setEditing(true); }}
          style={{ padding:"5px 8px", background:estimated?T.redBg:T.inputBg, border:`1px solid ${estimated?T.red+"44":T.inputBorder}`, borderRadius:4, color:estimated?T.red:T.text, fontFamily:MN, fontSize:13, cursor:"text", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span>{value != null ? `${prefix}${Number(value).toLocaleString("en-US")}` : <span style={{ color:T.textFaint }}> -- </span>}</span>
          <span style={{ fontSize:12, color:estimated?T.red:T.textFaint, opacity:0.75 }}>{estimated?"verify":"edit"}</span>
        </div>
      )}
      {note && <div style={{ fontSize:11, color:T.textFaint, fontFamily:MN, marginTop:4 }}>{note}</div>}
    </div>
  );
}

  const commitBase = () => {
    const n = Number(String(rawBase).replace(/[^0-9.-]/g,""));
    if (!isNaN(n) && n >= 0) onBaseChange(n);
    setEditingBase(false);
  };
  const commitHigh = () => {
    const n = Number(String(rawHigh).replace(/[^0-9.-]/g,""));
    if (!isNaN(n) && n >= 0) onHighChange(n);
    setEditingHigh(false);
  };

  const cell = (val, isHigh, editing, setEditing, raw, setRaw, commit) => {
    const accent = isHigh ? T.highAccent : T.baseAccent;
    const bg     = isHigh ? T.highBg     : T.baseBg;
    const border = isHigh ? T.highBorder : T.baseBorder;
    return (
      <div style={{ flex:1 }}>
        <div style={{ fontSize:12, textTransform:"uppercase", letterSpacing:"0.1em", color:accent, fontFamily:MN, marginBottom:4, opacity:0.8 }}>
          {isHigh ? "HIGH" : "BASE"}
        </div>
        {editing ? (
          <input autoFocus value={raw} onChange={e=>setRaw(e.target.value)}
            onBlur={commit} onKeyDown={e=>{ if(e.key==="Enter") commit(); if(e.key==="Escape") setEditing(false); }}
            style={{ width:"100%", padding:"6px 9px", background:bg, border:`1px solid ${border}`, borderRadius:4, color:accent, fontFamily:MN, fontSize:13, outline:"none", boxSizing:"border-box" }}/>
        ) : (
          <div onClick={() => { setRaw(String(val||"")); setEditing(true); }}
            style={{ padding:"6px 9px", background:bg, border:`1px solid ${border}`, borderRadius:4, color:accent, fontFamily:MN, fontSize:13, cursor:"text", fontWeight:600 }}>
            {val != null ? Number(val).toLocaleString("en-US") : <span style={{ color:T.textFaint, fontWeight:400 }}> -- </span>}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ marginBottom:16 }}>
      <FL tipId={tipId}>{label}</FL>
      <div style={{ display:"flex", gap:8 }}>
        {cell(baseValue, false, editingBase, setEditingBase, rawBase, setRawBase, commitBase)}
        {cell(highValue, true,  editingHigh, setEditingHigh, rawHigh, setRawHigh, commitHigh)}
      </div>
      {note && <div style={{ fontSize:11, color:T.textFaint, fontFamily:MN, marginTop:4 }}>{note}</div>}
    </div>
  );
}

// -- Dual dollar field --------------------------------------------
function DualDollarField({ label, tipId, baseValue, highValue, onBaseChange, onHighChange, note }) {
  const [editingBase, setEditingBase] = useState(false);
  const [editingHigh, setEditingHigh] = useState(false);

  const [rawHigh, setRawHigh] = useState("");
  const commit = (raw, onChange, setEditing) => {
    const n = Number(String(raw).replace(/[^0-9.-]/g,""));
    if (!isNaN(n) && n >= 0) onChange(n);
    setEditing(false);
  };
  const cell = (val, isHigh, editing, setEditing, raw, setRaw) => {
    const accent = isHigh ? T.highAccent : T.baseAccent;
    const bg     = isHigh ? T.highBg     : T.baseBg;
    const border = isHigh ? T.highBorder : T.baseBorder;
    const onChange = isHigh ? onHighChange : onBaseChange;
    return (
      <div style={{ flex:1 }}>
        <div style={{ fontSize:12, textTransform:"uppercase", letterSpacing:"0.1em", color:accent, fontFamily:MN, marginBottom:4, opacity:0.8 }}>{isHigh?"HIGH":"BASE"}</div>
        {editing ? (
          <input autoFocus value={raw} onChange={e=>setRaw(e.target.value)}
            onBlur={()=>commit(raw,onChange,setEditing)}
            onKeyDown={e=>{ if(e.key==="Enter") commit(raw,onChange,setEditing); if(e.key==="Escape") setEditing(false); }}
            style={{ width:"100%", padding:"6px 9px", background:bg, border:`1px solid ${border}`, borderRadius:4, color:accent, fontFamily:MN, fontSize:13, outline:"none", boxSizing:"border-box" }}/>
        ) : (
          <div onClick={()=>{ setRaw(String(val||"")); setEditing(true); }}
            style={{ padding:"6px 9px", background:bg, border:`1px solid ${border}`, borderRadius:4, color:accent, fontFamily:MN, fontSize:13, cursor:"text", fontWeight:600 }}>
            {val != null ? fmtD(val) : <span style={{ color:T.textFaint, fontWeight:400 }}> -- </span>}
          </div>
        )}

    );
  };
  return (
    <div style={{ marginBottom:16 }}>
      <FL tipId={tipId}>{label}</FL>
      <div style={{ display:"flex", gap:8 }}>
        {cell(baseValue, false, editingBase, setEditingBase, rawBase, setRawBase)}
        {cell(highValue, true,  editingHigh, setEditingHigh, rawHigh, setRawHigh)}
      </div>
      {note && <div style={{ fontSize:11, color:T.textFaint, fontFamily:MN, marginTop:4 }}>{note}</div>}
    </div>

// -- Artist Lookup ------------------------------------------------
async function lookupArtist(artistName) {
  // Use web search tool so Claude looks up live data rather than recalling from training
  const prompt = `Search the web for current Spotify and Instagram stats for the artist "${artistName}".

Search for:
1. "${artistName} spotify followers monthly listeners"
2. "${artistName} instagram followers"

Then return ONLY valid JSON with no other text or markdown:
{"spotifyFollowers":NUMBER,"spotifyListeners":NUMBER,"instagramFollowers":NUMBER,"orchardDrawdown":NUMBER,"notes":"STRING"}

Rules:
- spotifyFollowers and spotifyListeners must come from actual search results, not your training data
- orchardDrawdown = a conservative Orchard marketing drawdown estimate between 0-1000000
- notes = 1-2 sentences on the artist's current momentum based on what you find
- All NUMBER fields must be plain integers with no commas or symbols`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      tools:[{ type:"web_search_20250305", name:"web_search" }],
      messages:[{ role:"user", content:prompt }]
    })
  });
  const data = await response.json();
  // Extract final text block  --  appears after tool use blocks
  const textBlocks = (data.content || []).filter(b => b.type === "text");
  const text = textBlocks[textBlocks.length - 1]?.text || "";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ================================================================
// MAIN COMPONENT
// ================================================================

function ProjectionsBuilder({ onSave, onCancel }) {

  // Lookup
  const [artistName, setArtistName]   = useState("");
  const [lookupState, setLookupState] = useState("idle");
  const [lookupNotes, setLookupNotes] = useState("");
  const [estimated, setEstimated] = useState({ followers:false, listeners:false, instagram:false });

  // Platform data
  const [spotifyFollowers,   setSpotifyFollowers]   = useState(null);
  const [spotifyListeners,   setSpotifyListeners]   = useState(null);
  const [instagramFollowers, setInstagramFollowers] = useState(null);

  // Derived signal overrides
  const [ovTour, setOvTour]   = useState(false);
  const [ovInfra, setOvInfra] = useState(false);
  const [manualTier, setManualTier]   = useState("arena");
  const [manualInfra, setManualInfra] = useState(60);

  // Theatrical  --  dual GBO (base uses model base, high uses breakout)
  const [manualGboBase, setManualGboBase] = useState(null);
  const [manualGboHigh, setManualGboHigh] = useState(null);
  const [paOverridden, setPaOverridden]   = useState(false);
  const [paValue, setPaValue]             = useState(null);

  // Albums  --  dual overrides
  const [manualVinylBase, setManualVinylBase] = useState(null);
  const [manualVinylHigh, setManualVinylHigh] = useState(null);
  const [manualCdBase, setManualCdBase]       = useState(null);
  const [manualCdHigh, setManualCdHigh]       = useState(null);
  const [manualCassetteBase, setManualCassetteBase] = useState(null);
  const [manualCassetteHigh, setManualCassetteHigh] = useState(null);
  const [manualStreamsBase, setManualStreamsBase] = useState(null);
  const [manualStreamsHigh, setManualStreamsHigh] = useState(null);

  // Streaming sale  --  dual
  const [streamingSaleBase, setStreamingSaleBase] = useState(1000000);
  const [streamingSaleHigh, setStreamingSaleHigh] = useState(2000000);

  // Orchard drawdown  --  dual
  const [orchardBase, setOrchardBase] = useState(250000);
  const [orchardHigh, setOrchardHigh] = useState(500000);

  // Merch  --  dual overrides
  const [manualMerchBase, setManualMerchBase] = useState(null);
  const [manualMerchHigh, setManualMerchHigh] = useState(null);

  // Artist fee  --  dual
  const [artistFeeBase, setArtistFeeBase] = useState(1000000);
  const [artistFeeHigh, setArtistFeeHigh] = useState(1000000);

  // Budget scale  --  dual
  const [budgetPctBase, setBudgetPctBase] = useState(100);
  const [budgetPctHigh, setBudgetPctHigh] = useState(100);

  const hasData = lookupState === "done";
  const sel = { width:"100%", padding:"5px 8px", background:T.inputBg, border:`1px solid ${T.inputBorder}`, borderRadius:4, color:T.text, fontFamily:MN, fontSize:12, outline:"none" };

  // -- Derived signals ------------------------------------------
  const touringTier = useMemo(() => {
    if (ovTour) return manualTier;
    if (spotifyListeners && instagramFollowers) return autoTouringTier(spotifyListeners, instagramFollowers);
    return "arena";
  }, [ovTour, manualTier, spotifyListeners, instagramFollowers]);

  const infraScore = useMemo(() => {
    if (ovInfra) return manualInfra;
    if (spotifyListeners && instagramFollowers) return autoMerchInfraScore(spotifyListeners, instagramFollowers, touringTier);
    return 60;
  }, [ovInfra, manualInfra, spotifyListeners, instagramFollowers, touringTier]);

  const depthBand = useMemo(() => {
    if (!spotifyFollowers || !spotifyListeners) return "mid";
    const r = spotifyFollowers / spotifyListeners;
    return r >= 0.65 ? "high" : r >= 0.35 ? "mid" : "low";
  }, [spotifyFollowers, spotifyListeners]);

  // -- Model projections ----------------------------------------
  const theatProj  = useMemo(() => spotifyFollowers ? projectTheatrical(spotifyFollowers) : null, [spotifyFollowers]);
  const albumProj  = useMemo(() => spotifyListeners ? projectAlbumSales(spotifyListeners, artistName) : null, [spotifyListeners, artistName]);
  const streamProj = useMemo(() => spotifyListeners ? projectStreams(spotifyListeners) : null, [spotifyListeners]);
  const merchProj  = useMemo(() => {
    if (!spotifyFollowers || !spotifyListeners) return null;
    return projectMerch({ spotifyFollowers, spotifyListeners, touringTier, instagramFollowers:instagramFollowers||0, merchInfraScore:infraScore, depthBand });
  }, [spotifyFollowers, spotifyListeners, touringTier, instagramFollowers, infraScore, depthBand]);

  // -- Effective values -----------------------------------------
  const pa = paOverridden && paValue != null ? paValue : (theatProj?.distCost || 0);

  // GBO: base scenario uses model base, high uses model breakout
  const gboBase = manualGboBase ?? (theatProj?.baseGBO || 0);
  const gboHigh = manualGboHigh ?? (theatProj?.breakoutGBO || 0);

  const vinylBase   = manualVinylBase   ?? (albumProj?.vinyl.base  || 0);
  const vinylHigh   = manualVinylHigh   ?? (albumProj?.vinyl.high  || 0);
  const cdBase      = manualCdBase      ?? (albumProj?.cd.base     || 0);
  const cdHigh      = manualCdHigh      ?? (albumProj?.cd.high     || 0);
  const cassetteBase = manualCassetteBase ?? (albumProj?.cassette.base || 0);
  const cassetteHigh = manualCassetteHigh ?? (albumProj?.cassette.high || 0);
  const streamsBase = manualStreamsBase  ?? (streamProj?.base       || 0);
  const streamsHigh = manualStreamsHigh  ?? (streamProj?.high       || 0);
  const merchBase   = manualMerchBase   ?? (merchProj?.base        || 0);
  const merchHigh   = manualMerchHigh   ?? (merchProj?.high        || 0);

  // -- Build scenario objects -----------------------------------
  const buildScenario = (tier) => ({
    vinyl:          tier === "base" ? vinylBase   : vinylHigh,
    cd:             tier === "base" ? cdBase      : cdHigh,
    cassette:       tier === "base" ? cassetteBase : cassetteHigh,
    gbo:            tier === "base" ? gboBase     : gboHigh,
    theatDistCost:  theatProj?.distCost || 0,
    pa,
    streamingSale:  tier === "base" ? streamingSaleBase : streamingSaleHigh,
    streams:        tier === "base" ? streamsBase : streamsHigh,
    merchUnits:     tier === "base" ? merchBase   : merchHigh,
    artistFee:      tier === "base" ? artistFeeBase  : artistFeeHigh,
    orchardDrawdown:tier === "base" ? orchardBase     : orchardHigh,
  });

  // -- Live results ---------------------------------------------
  const resultBase = useMemo(() => {
    const sc = {
      vinyl:vinylBase, cd:cdBase, cassette:cassetteBase, gbo:gboBase,
      theatDistCost:theatProj?.distCost||0, pa,
      streamingSale:streamingSaleBase, streams:streamsBase,
      merchUnits:merchBase, artistFee:artistFeeBase, orchardDrawdown:orchardBase,
    };
    return run(sc, DR, budgetPctBase / 100);
  }, [vinylBase, cdBase, cassetteBase, gboBase, streamsBase, merchBase, artistFeeBase, orchardBase, streamingSaleBase, pa, theatProj, budgetPctBase]);

  const resultHigh = useMemo(() => {
    const sc = {
      vinyl:vinylHigh, cd:cdHigh, cassette:cassetteHigh, gbo:gboHigh,
      theatDistCost:theatProj?.distCost||0, pa,
      streamingSale:streamingSaleHigh, streams:streamsHigh,
      merchUnits:merchHigh, artistFee:artistFeeHigh, orchardDrawdown:orchardHigh,
    };
    return run(sc, DR, budgetPctHigh / 100);
  }, [vinylHigh, cdHigh, cassetteHigh, gboHigh, streamsHigh, merchHigh, artistFeeHigh, orchardHigh, streamingSaleHigh, pa, theatProj, budgetPctHigh]);

  // -- Lookup ---------------------------------------------------
  const doLookup = useCallback(async () => {
    if (!artistName.trim()) return;
    setLookupState("loading");
    try {
      const d = await lookupArtist(artistName);
      setSpotifyFollowers(d.spotifyFollowers);
      setSpotifyListeners(d.spotifyListeners);
      setInstagramFollowers(d.instagramFollowers);
      if (d.notes) setLookupNotes(d.notes);
      setEstimated({ followers:true, listeners:true, instagram:true });
      // Reset all overrides
      setEstimated({ followers:false, listeners:false, instagram:false });
      setOvTour(false); setOvInfra(false);
      setManualGboBase(null); setManualGboHigh(null);
      setPaOverridden(false); setPaValue(null);
      setManualVinylBase(null); setManualVinylHigh(null);
      setManualCdBase(null); setManualCdHigh(null);
      setManualCassetteBase(null); setManualCassetteHigh(null);
      setManualStreamsBase(null); setManualStreamsHigh(null);
      setManualMerchBase(null); setManualMerchHigh(null);
      // Reset all dual financial defaults
      setStreamingSaleBase(1000000); setStreamingSaleHigh(2000000);
      setOrchardBase(250000);        setOrchardHigh(500000);
      setArtistFeeBase(1000000);     setArtistFeeHigh(1000000);
      setBudgetPctBase(100);         setBudgetPctHigh(100);
      setLookupState("done");
    } catch(e) {
      console.error(e);
      setLookupState("error");
    }
  }, [artistName]);

  // -- Save  --  emits two scenario rows --------------------------
  const handleSave = () => {
    if (!artistName.trim() || !resultBase) return;
    const label = artistName.trim().toUpperCase();
    onSave && onSave(`${label}  --  BASE`, buildScenario("base"));
    onSave && onSave(`${label}  --  HIGH`, buildScenario("high"));
  };

  return (
    <div style={{ fontFamily:MN, background:T.bgSub, minHeight:"100vh" }}>
      <div style={{ maxWidth:680, margin:"0 auto", padding:"32px 20px 80px" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
          <div>
            <div style={{ fontFamily:MN, fontSize:14, fontWeight:700, color:T.gold, textTransform:"uppercase", letterSpacing:"0.12em" }}>New Scenario</div>
            <div style={{ fontSize:10, color:T.textDim, fontFamily:MN, marginTop:2, letterSpacing:"0.08em", textTransform:"uppercase" }}>The Round  --  Artist Projection Builder</div>
          </div>
          {onCancel && <button onClick={onCancel} style={{ background:"none", border:"none", color:T.textDim, cursor:"pointer", fontSize:20 }}>x</button>}
        </div>

        {/* Legend */}
        {hasData && (
          <div style={{ display:"flex", gap:12, marginBottom:10, padding:"6px 10px", background:T.bg, border:`1px solid ${T.border}`, borderRadius:6 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:10, height:10, borderRadius:2, background:T.baseBg, border:`1px solid ${T.baseBorder}` }}/>
              <span style={{ fontSize:11, color:T.baseAccent, fontFamily:MN, letterSpacing:"0.08em" }}>BASE  --  conservative projection</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:10, height:10, borderRadius:2, background:T.highBg, border:`1px solid ${T.highBorder}` }}/>
              <span style={{ fontSize:11, color:T.highAccent, fontFamily:MN, letterSpacing:"0.08em" }}>HIGH  --  optimistic projection</span>
            </div>
          </div>
        )}

        {/* == ARTIST == */}
        <Section>
          <SH sub="Enter an artist name to auto-populate all projection fields">Artist</SH>
          <div style={{ display:"flex", gap:8 }}>
            <input value={artistName} onChange={e=>setArtistName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&doLookup()}
              placeholder="e.g. Phoebe Bridgers, Turnstile, Mk.gee..."
              style={{ flex:1, padding:"10px 12px", background:T.inputBg, border:`1px solid ${T.inputBorder}`, borderRadius:5, color:T.text, fontFamily:SS, fontSize:12, outline:"none" }}/>
            <button onClick={doLookup} disabled={lookupState==="loading"}
              style={{ padding:"10px 20px", background:lookupState==="loading"?T.bgDeep:T.goldBg, border:`1px solid ${T.goldBorder}`, color:lookupState==="loading"?T.textDim:T.gold, borderRadius:5, fontFamily:MN, fontSize:11, cursor:lookupState==="loading"?"wait":"pointer", fontWeight:600, whiteSpace:"nowrap", letterSpacing:"0.05em" }}>
              {lookupState==="loading" ? "LOOKING UP..." : "LOOKUP ->"}
            </button>
          </div>
          {lookupState==="error" && <div style={{ marginTop:10, fontSize:11, color:T.red, fontFamily:MN }}>Lookup failed  --  enter data manually below.</div>}
          {lookupNotes && (
            <div style={{ marginTop:12, padding:"10px 13px", background:T.goldBg, border:`1px solid ${T.goldBorder}`, borderRadius:5, fontSize:11, color:T.textMid, fontFamily:SS, lineHeight:1.65 }}>
              {lookupNotes}

          {hasData && (

              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textDim, fontFamily:MN, marginBottom:10 }}>Platform Data</div>
              <div style={{ marginBottom:6, fontSize:11, color:T.red, fontFamily:MN, display: estimated.followers||estimated.listeners||estimated.instagram ? "flex" : "none", alignItems:"center", gap:6 }}>
                <span style={{ background:T.redBg, border:`1px solid ${T.red}30`, borderRadius:3, padding:"1px 7px", fontSize:12, letterSpacing:"0.06em" }}>ESTIMATED</span>
                <span style={{ color:T.textDim }}>These numbers are approximate  --  edit any field to confirm it.</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:18 }}>
                <NumField label="Spotify Followers" tipId="spotifyFollowers" value={spotifyFollowers}

                <NumField label="Monthly Listeners" tipId="spotifyListeners" value={spotifyListeners}

                  estimated={estimated.listeners}/>
                <NumField label="Instagram Followers" tipId="instagramFollowers" value={instagramFollowers}
                  onChange={v=>{ setInstagramFollowers(v); setEstimated(e=>({...e,instagram:false})); }}

// -- Backend Tab  --  faithful recreation of Episode Model-Master-V6 -
function BackendTab({ s, r, budgetPct, royaltyTopLine=true, onToggleRoyalty }) {
  const res = useMemo(() => run(s, r, budgetPct / 100), [s, r, budgetPct]);

  // -- Pull all intermediates directly from run()  --  single source of truth --
  const gbo          = s.gbo || 0;
  const exhibTake    = res._gT * r.exhibitorTake;
  const netProfit    = res._theatNetProfit;
  const distShare    = res._distShare;
  const ntcTheat     = res._tNC;
  const streamSale   = res._gS;
  const ntcStream    = res._ntcStream;
  const grossDig     = res._gD;
  const grossWhl     = res._gW;
  const grossD2C     = res._gDC;
  const grossMerch   = res._gM;
  const orchD        = s.orchardDrawdown || 0;
  const labRoyDig    = res._labRoyDig;
  const orchFeeDig   = res._orchDistFeeDig;
  const orchDDDig    = res._orchDDDig;
  const ntcDig       = res._dNC;
  const labRoyWhl    = res._labRoyWhl;
  const orchFeeWhl   = res._orchDistFeeWhl;
  const orchDDWhl    = res._orchDDWhl;
  const ntcWhl       = res._wNC;
  const labRoyD2C    = res._labRoyD2C;
  const mfD2C        = res._mfD2C;
  const ntcD2C       = res._dcNC;
  const mfMerch      = res._mfMerch;
  const ntcMerch     = res._mNC;
  const allNTCPos    = res.totalNTC;
  const camaFee      = res.camaFeeAmt;
  const ghFee        = res.glasshausFeeAmt;
  const camaStreamShare = res._camaC?.[1] ?? 0;
  const saFee        = res._sf;
  const saExp        = res._saE;
  const sc           = v => (Number(v)||0) * (budgetPct/100);
  const albumMfgTotal = res.albumMfgActual;
  const merchMfgTotal = res.merchMfgActual;
  const budgAlbumMfg  = sc(r.budgetAlbumMfg);
  const budgMerchMfg  = sc(r.budgetMerchMfg);
  const budgMktg      = sc(r.budgetMarketing);
  const albumCOGPerCh = res.albumCOGPerCh;
  const merchCOGDeducted = res.merchCOGDeducted;
  const merchCOGSurplus  = res.merchCOGSurplus;
  const postGhMktgPerCh  = res.postGhMktgPerCh;
  const postGhMktgRemainder = res.postGhMktgRemainder;
  const prodBudget    = res.productionBudget;
  const trmDef        = r.trmDeferral;
  const totalNTC      = res.totalNTC;
  const totalGross    = res.totalGross;
  const nti           = res.netToInvestors;
  const netProc       = res.netProceeds;
  const invReturn     = res.totalInvestorReturn;
  const invROI        = res.investorROI;
  const artBack       = res.artistBackend;
  const trmBack       = res.trmBackend;
  const trmPts        = res.trmBackendPts;
  const legalBack     = netProc * 0.01;
  const talentBack    = netProc * 0.0125;
  const labRoyTotal   = labRoyDig + labRoyWhl + labRoyD2C;
  const mktgGrossBase = grossDig + grossWhl + grossD2C + grossMerch;
  const neededMktg    = mktgGrossBase / (r.targetROAS || 5);
  const totalMktg     = budgMktg + orchD + (s.pa ?? s.theatDistCost ?? 0);
  const ntcToGross    = totalGross>0 ? totalNTC/totalGross : 0;
  const ntiToNTC      = totalNTC>0  ? nti/totalNTC : 0;
  const ntiToGross    = totalGross>0 ? nti/totalGross : 0;
  const ntis          = res.ntis || {theat:0,stream:0,dig:0,whl:0,d2c:0,merch:0};

  // -- Local aliases for gross revenue detail rows -------------------
  const totalVinyl   = s.vinyl || 0;
  const totalCD      = s.cd || 0;
  const totalCassette = s.cassette || 0;
  const wV = Math.floor(totalVinyl * r.wholesaleShare);    const dV = totalVinyl - wV;
  const wC = Math.floor(totalCD * r.wholesaleShare);       const dC = totalCD - wC;
  const wK = Math.floor(totalCassette * r.wholesaleShare); const dK = totalCassette - wK;
  const vinylWhl = wV * r.vinylMSRP * r.wholesaleDiscount;
  const cdWhl    = wC * r.cdMSRP * r.wholesaleDiscount;
  const cassWhl  = wK * r.cassetteMSRP * r.wholesaleDiscount;
  const vinylD2C = dV * r.vinylMSRP;
  const cdD2C    = dC * r.cdMSRP;
  const cassD2C  = dK * r.cassetteMSRP;
  const streams  = s.streams || 0;
  const artistFee = s.artistFee || 0;
  const orchardOverage = 0;   // replaced by postGhMktgRemainder  --  kept for compat
  const wsRatio = (grossWhl+grossDig)>0 ? grossWhl/(grossWhl+grossDig) : 0;

  // -- Formatters ---------------------------------------------------
  const $  = n => { if(n==null) return " -- "; const a=Math.abs(n),neg=n<0,s="$"+Math.round(a).toLocaleString("en-US"); return neg?`(${s})`:s; };
  const pv = n => n==null?" -- ":(n*100).toFixed(2)+"%";
  const nv = n => n==null?" -- ":Math.round(n).toLocaleString("en-US");
  const dp = (n,p=2) => n==null?" -- ":Number(n).toFixed(p);

  // -- Style tokens -------------------------------------------------
  const F   = MN;
  const RH  = "20px";
  // Shared cell base
  const cb  = { fontFamily:F, fontSize:12, whiteSpace:"nowrap", lineHeight:RH, padding:"0 5px" };
  const cbl = { ...cb, textAlign:"left" };
  const cbr = { ...cb, textAlign:"right" };
  const dim = { ...cb, color:"#888", fontSize:11 };
  const red = { color:"#b00" };

  // Section/header backgrounds
  const BG = { sec:"#c6c6c6", hl1:"#fff2cc", hl2:"#e2efda", hl3:"#d9d9d9", odd:"#f7f7f5", even:"#ffffff", ntc:"#f0f5ff" };

  // Channel header colors
  const CH = [
    { bg:"#d6dce4", bd:"#adb9ca" },  // theatrical
    { bg:"#fce4d6", bd:"#f4c7b0" },  // streaming
    { bg:"#fff2cc", bd:"#ffe699" },  // digital
    { bg:"#e2efda", bd:"#c6e0b4" },  // wholesale
    { bg:"#dae3f3", bd:"#b8cce4" },  // d2c
    { bg:"#f8cbad", bd:"#f4b183" },  // merch
  ];

  const chHdr = (i, label) => ({
    ...cb, background:CH[i].bg, textAlign:"center", fontWeight:700, fontSize:11,
    textTransform:"uppercase", letterSpacing:"0.07em",
    borderLeft:`1px solid ${CH[i].bd}`, borderBottom:`1px solid ${CH[i].bd}`,
    padding:"2px 4px",
  });

  // Helpers for building rows
  // aRow: label cell spanning col 1+2, then 6 empty channel cells
  const mkRow = (cells, bg=BG.even) => (
    <tr style={{ height:RH, background:bg, borderBottom:"1px solid #ebebeb" }}>
      {cells}
    </tr>
  );

  // Left assumption label + value (spans cols 1-2 via sub-cells)
  const aL = (txt, style={}) => <td style={{ ...cbl, ...style }}>{txt}</td>;
  const aR = (txt, style={}) => <td style={{ ...cbr, minWidth:75, ...style }}>{txt}</td>;
  const blank = (n=6) => Array(n).fill(null).map((_,i)=><td key={i}/>);

  // Right channel cell
  const ch = (txt, style={}) => <td style={{ ...cbr, ...style }}>{txt}</td>;
  const chL = (txt, style={}) => <td style={{ ...cbl, fontSize:11, ...style }}>{txt}</td>;

  // Section header row  --  full width
  const secHdr = (label, cols=8) => (
    <tr style={{ background:BG.sec }}>
      <td colSpan={cols} style={{ ...cbl, fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em", padding:"2px 5px", borderTop:"1px solid #aaa", borderBottom:"1px solid #aaa" }}>
        {label}
      </td>
    </tr>
  );

  // Channel sub-header row (partner labels)
  const partnerHdr = (labels) => (
    <tr style={{ background:BG.hl3 }}>
      <td colSpan={2} style={{ ...cbl, fontSize:11, fontWeight:700, padding:"1px 5px", borderBottom:"1px solid #bbb" }}/>
      {labels.map((l,i)=><td key={i} style={{ ...cbl, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", padding:"1px 4px", borderBottom:"1px solid #bbb", background:CH[i].bg }}>{l}</td>)}
    </tr>
  );

  return (
    <div style={{ fontFamily:F, fontSize:12, color:"#111", background:T.bg, padding:"10px 16px 40px" }}>

      {/* PAGE HEADER */}
      <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", gap:10, marginBottom:10, paddingBottom:6, borderBottom:"2px solid #ccc" }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:10 }}>
          <span style={{ fontFamily:F, fontSize:14, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase" }}>Episode Model  --  Master V6</span>
          <span style={{ fontFamily:F, fontSize:11, color:"#999", letterSpacing:"0.1em" }}>. Backend Reference . Live from Selected Scenario</span>
        </div>

const TABS=[["model","Model"],["compare","Compare"],["waterfall","Waterfall"],["scenarios","Scenarios"],["backend","Backend"]];
const FONT_SIZES=[13,14,15,16,18];

function TheRoundModel() {
  const [scenarios,setScenarios]=useState(SEED);
  const [selected,setSelected]=useState("LANA DEL REY  --  LOW");
  const [tab,setTab]=useState("model");
  const [compareSort,setCompareSort]=useState({col:null,dir:1}); // dir: 1=asc, -1=desc
  const [rates,setRates]=useState({...DR});
  const [royaltyTopLine,setRoyaltyTopLine]=useState(true); // true=deduct at top of waterfall; false=12% of artist backend only
  // Working overrides for the current scenario  --  cleared on scenario switch unless saved
  const [overrides,setOverrides]=useState({});          // revenue input overrides
  const [budgetLineEdits,setBudgetLineEdits]=useState({}); // {rateKey: absoluteValue}
  const [workingBudgetPct,setWorkingBudgetPct]=useState(null); // null = use global
  const [workingRateEdits,setWorkingRateEdits]=useState({});   // fee rate overrides
  const [hasUnsaved,setHasUnsaved]=useState(false);
  const [showBuilder,setShowBuilder]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [editingCell,setEditingCell]=useState(null);
  const [editVal,setEditVal]=useState("");
  const [editingBudgetKey,setEditingBudgetKey]=useState(null);  // which budget line is open
  const [editingBudgetVal,setEditingBudgetVal]=useState("");    // raw string while typing
  const csvImportRef=useRef(null);
  const [budgetPct,setBudgetPct]=useState(100);  // global default budget scale
  const [fs,setFs]=useState(15);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    (async()=>{
      const STORAGE_VERSION="v8";
      try{
        const ver=await window.storage.get("tr-version").catch(()=>null);
        if(ver?.value===STORAGE_VERSION){
          try{const s=await window.storage.get("tr-sc");if(s?.value)setScenarios(JSON.parse(s.value));}catch(e){}
          try{const r=await window.storage.get("tr-rt");if(r?.value)setRates({...DR,...JSON.parse(r.value)});}catch(e){}
        } else {
          try{await window.storage.delete("tr-sc");}catch(e){}
          try{await window.storage.delete("tr-rt");}catch(e){}
          await window.storage.set("tr-version",STORAGE_VERSION);
        }
      }catch(e){}
      setReady(true);
    })();
  },[]);
  useEffect(()=>{if(!ready)return;(async()=>{try{await window.storage.set("tr-sc",JSON.stringify(scenarios));}catch(e){}})();},[scenarios,ready]);
  useEffect(()=>{if(!ready)return;(async()=>{try{await window.storage.set("tr-rt",JSON.stringify(rates));}catch(e){}})();},[rates,ready]);

  // When switching scenario, load any saved per-scenario overrides from the scenario object
  useEffect(()=>{
    const scn=scenarios[selected]||{};
    setOverrides({});
    setBudgetLineEdits(scn._budgetLineEdits||{});
    setWorkingBudgetPct(scn._budgetPct??null);
    setWorkingRateEdits(scn._rateEdits||{});
    setHasUnsaved(false);
  },[selected]);

  // Mark unsaved whenever working state changes (after initial load)
  const markDirty=()=>setHasUnsaved(true);

  const scenarioData=useMemo(()=>({...scenarios[selected],...overrides}),[selected,scenarios,overrides]);

  // Effective rates = global rates + per-scenario rate edits + budget line absolute overrides
  // Falls back to scenario's saved _budgetLineEdits and _rateEdits when working state is clean
  const effectiveRates=useMemo(()=>{
    const scn=scenarios[selected]||{};
    const rateBase={...rates,...(scn._rateEdits||{}),...workingRateEdits};
    const lineBase={...(scn._budgetLineEdits||{}),...budgetLineEdits};
    Object.entries(lineBase).forEach(([k,v])=>{ rateBase[k]=v; });
    rateBase.royaltyTopLine=royaltyTopLine;
    return rateBase;
  },[rates,workingRateEdits,budgetLineEdits,scenarios,selected,royaltyTopLine]);

  const activeBudgetPct=workingBudgetPct??((scenarios[selected]||{})._budgetPct)??budgetPct;
  const budgetPctForRun=Object.keys({...(scenarios[selected]||{})._budgetLineEdits,...budgetLineEdits}).length>0?100:activeBudgetPct;
  const result=useMemo(()=>run(scenarioData,effectiveRates,budgetPctForRun/100),[scenarioData,effectiveRates,budgetPctForRun]);

  // Save all current working state back into the scenario object
  const saveToScenario=()=>{
    // Derive effective budget pct from actual edited totals so it displays correctly after save
    const editedTotal=Object.values(result.budgetLines).reduce((a,v)=>a+v,0);
    const derivedPct=Math.round(editedTotal/TOTAL_STANDARD_BUDGET*100);
    const savedBudgetPct=Object.keys(budgetLineEdits).length>0?derivedPct:(workingBudgetPct??budgetPct);
    setScenarios(p=>({...p,[selected]:{
      ...p[selected],
      ...overrides,
      _budgetLineEdits: Object.keys(budgetLineEdits).length>0?{...budgetLineEdits}:undefined,
      _budgetPct: savedBudgetPct,
      _rateEdits: Object.keys(workingRateEdits).length>0?{...workingRateEdits}:undefined,
    }}));
    setBudgetLineEdits({});
    setOverrides({});
    setHasUnsaved(false);
  };

  const discardChanges=()=>{
    const scn=scenarios[selected]||{};
    setOverrides({});
    setBudgetLineEdits(scn._budgetLineEdits||{});
    setWorkingBudgetPct(scn._budgetPct??null);
    setWorkingRateEdits(scn._rateEdits||{});
    setHasUnsaved(false);
  };

  const clearScenarioOverrides=(name)=>{
    setScenarios(p=>({...p,[name]:{...p[name],_budgetLineEdits:undefined,_budgetPct:undefined,_rateEdits:undefined}}));
    if(name===selected){setBudgetLineEdits({});setWorkingBudgetPct(null);setWorkingRateEdits({});setHasUnsaved(false);}
  };

  const upRate=(k,v)=>{setWorkingRateEdits(p=>({...p,[k]:v}));markDirty();};
  const upOv=(k,v)=>{setOverrides(p=>({...p,[k]:v}));markDirty();};
  const upBudgetLine=(k,v)=>{setBudgetLineEdits(p=>({...p,[k]:v}));markDirty();};
  const clearBudgetLine=(k)=>{setBudgetLineEdits(p=>{const n={...p};delete n[k];return n;});markDirty();};
  const saveBudgetLineEdit=(k,rawVal)=>{
    const n=Number(String(rawVal).replace(/[^0-9.-]/g,""));
    if(!isNaN(n)&&n>=0) upBudgetLine(k,n);
    setEditingBudgetKey(null);
    setEditingBudgetVal("");
  };
  const cancelBudgetLineEdit=()=>{setEditingBudgetKey(null);setEditingBudgetVal("");};
  const upBudgetPct=(v)=>{setWorkingBudgetPct(v);markDirty();};

  const saveScenario=(name,data)=>{
    setScenarios(p=>({...p,[name]:data}));
    setSelected(name);
    setTab("model");
  };
  const saveScenarioDone=()=>setShowBuilder(false);
  const duplicateScenario=(name)=>{let n=name+" COPY",i=2;while(scenarios[n]){n=name+" COPY "+i;i++;}setScenarios(p=>({...p,[n]:{...p[name]}}));};
  const deleteScenario=(name)=>{if(confirmDelete===name){setScenarios(p=>{const n={...p};delete n[name];return n;});if(selected===name)setSelected(Object.keys(scenarios).find(k=>k!==name)||"");setConfirmDelete(null);}else{setConfirmDelete(name);setTimeout(()=>setConfirmDelete(null),3000);}};

  // Per-scenario locked budget for scenarios table display
  const getScenarioBudgetPct=(name)=>{const s=scenarios[name];return s?._budgetPct??budgetPct;};
  const scenarioIsLocked=(name)=>{const s=scenarios[name]||{};return !!(s._budgetPct!==undefined||s._budgetLineEdits||s._rateEdits);};
  const setScenarioBudgetPct=(name,pct)=>setScenarios(p=>({...p,[name]:{...p[name],_budgetPct:pct}}));
  const clearScenarioBudget=(name)=>setScenarios(p=>({...p,[name]:{...p[name],_budgetPct:undefined}}));

  const CSV_FIELDS=[
    {k:"gbo",            h:"GBO"},
    {k:"theatDistCost",  h:"Dist Cost"},
    {k:"pa",             h:"P&A"},
    {k:"streamingSale",  h:"Stream Sale"},
    {k:"streams",        h:"Streams"},
    {k:"vinyl",          h:"Vinyl"},
    {k:"cd",             h:"CD"},
    {k:"cassette",       h:"Cassette"},
    {k:"orchardDrawdown",h:"Orch DD"},
    {k:"merchUnits",     h:"Merch Units"},
    {k:"artistFee",      h:"Artist Fee"},
  ];

  const exportScenariosCSV=()=>{
    const headers=["Scenario",...CSV_FIELDS.map(f=>f.h)];
    const rows=Object.entries(scenarios).map(([name,s])=>
      [name,...CSV_FIELDS.map(f=>s[f.k]??0)]
    );
    const esc=v=>{const str=String(v==null?"":v);return str.includes(",")||str.includes('"')||str.includes("\n")?'"'+str.replace(/"/g,'""')+'"':str;};
    const csv=[headers,...rows].map(row=>row.map(esc).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="TheRound_Scenarios_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

  const importScenariosCSV=(file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const parseRow=(line)=>{
        const cols=[]; let cur="",inQ=false;
        for(let i=0;i<line.length;i++){
          const c=line[i];
          if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
          else if(c===','&&!inQ){cols.push(cur);cur="";}
          else cur+=c;
        }
        cols.push(cur);
        return cols.map(s=>s.trim());
      };
      try {
        const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){alert("CSV appears empty  --  need at least a header row and one data row.");return;}
        const hdrs=parseRow(lines[0]);
        const ci=(pattern)=>hdrs.findIndex(h=>pattern.test(h));
        const COL={
          scenario:        ci(/scenario/i),
          gbo:             ci(/^gbo$/i),
          theatDistCost:   ci(/dist.?cost/i),
          pa:              ci(/^p&?a$/i),
          streamingSale:   ci(/stream.?sale/i),
          streams:         ci(/^streams$/i),
          vinyl:           ci(/^vinyl$/i),
          cd:              ci(/^cd$/i),
          cassette:        ci(/^cassette$/i),
          orchardDrawdown: ci(/orch.?dd|drawdown/i),
          merchUnits:      ci(/merch.?(units)?$/i),
          artistFee:       ci(/artist.?fee/i),
        };
        if(COL.scenario===-1){alert("No 'Scenario' column found  --  check your CSV header row.");return;}
        const parsed={};
        for(let i=1;i<lines.length;i++){
          const cols=parseRow(lines[i]);
          const name=(cols[COL.scenario]||"").trim();
          if(!name) continue;
          const scn={};
          CSV_FIELDS.forEach(({k})=>{
            const idx=COL[k];
            if(idx!=null&&idx>=0&&cols[idx]!==undefined){
              const v=Number(String(cols[idx]).replace(/[$,%\s]/g,""));
              scn[k]=isNaN(v)?0:v;
            }
          });
          parsed[name]=scn;
        }
        const count=Object.keys(parsed).length;
        if(count===0){alert("No valid scenario rows found. Make sure your CSV has a Scenario column with names.");return;}
        // Merge: overwrite matching names, add new ones, keep existing unmatched
        setScenarios(prev=>{
          const existingNames=Object.keys(prev);
          const overwritten=Object.keys(parsed).filter(n=>existingNames.includes(n));
          const added=Object.keys(parsed).filter(n=>!existingNames.includes(n));
          const merged={...prev,...parsed};
          try{window.storage.set("tr-sc",JSON.stringify(merged));}catch(e){}
          const msg=[
            added.length?`Added: ${added.slice(0,3).join(", ")}${added.length>3?" + "+(added.length-3)+" more":""}`:null,
            overwritten.length?`Overwritten: ${overwritten.slice(0,3).join(", ")}${overwritten.length>3?" + "+(overwritten.length-3)+" more":""}`:null,
          ].filter(Boolean).join("\n");
          setTimeout(()=>alert("Import complete.\n\n"+msg),50);
          return merged;
        });
        setSelected(Object.keys(parsed)[0]);
      } catch(err){alert("Error parsing CSV: "+err.message);}
    };
    reader.readAsText(file);
