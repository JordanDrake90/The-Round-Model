                </div>
                <Slider fs={fs} label={`TRM Deferral: ${fmtD(effectiveRates.trmDeferral)}`} value={effectiveRates.trmDeferral} onChange={v=>upRate("trmDeferral",v)} min={0} max={1000000} step={25000} fmt={fmtD}/>
                <div style={{display:"flex",justifyContent:"space-between",padding:"2px 0",fontWeight:700,fontFamily:MN,fontSize:fs-2,borderTop:`1px solid ${T.borderStrong}`,marginTop:4}}>
                  <span style={{color:T.textDim}}>Total incl. Deferral</span><span style={{color:T.gold}}>{fmtD(result.productionBudget+rates.trmDeferral)}</span>
                </div>
                {(result.albumMfgOverage>0||result.merchMfgOverage>0)&&(
                  <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
                    {result.albumMfgOverage>0&&<div style={{padding:"5px 8px",background:T.redBg,border:"1px solid rgba(176,48,48,0.3)",borderRadius:4,fontSize:10,color:T.red,fontFamily:MN}}>! Album mfg budget ^ by {fmtD(result.albumMfgOverage)}</div>}
                    {result.merchMfgOverage>0&&<div style={{padding:"5px 8px",background:T.redBg,border:"1px solid rgba(176,48,48,0.3)",borderRadius:4,fontSize:10,color:T.red,fontFamily:MN}}>! Merch mfg budget ^ by {fmtD(result.merchMfgOverage)}</div>}
                  </div>
                )}
              </div>

              {/* Marketing */}
              <div style={card}>
                <div style={slab}>Marketing</div>
                <Slider fs={fs} label="Orchard Drawdown" value={overrides.orchardDrawdown??scenarioData.orchardDrawdown??0} onChange={v=>upOv("orchardDrawdown",v)} min={0} max={1000000} step={25000} fmt={fmtD}/>
                <div style={{fontSize:11,color:T.textFaint,fontFamily:MN,marginBottom:10,marginTop:-4}}>Max $1M . Recouped from album revenue</div>
                <Slider fs={fs} label="Trafalgar P&A" value={trafPA} onChange={v=>upOv("pa",v)} min={0} max={1200000} step={25000} fmt={fmtD}/>
                <div style={{fontSize:11,color:T.textFaint,fontFamily:MN,marginTop:-4,marginBottom:12}}>Defaults to match dist. costs</div>
                <Slider fs={fs} label={`Target ROAS: ${effectiveRates.targetROAS||5}x`} value={effectiveRates.targetROAS||5} onChange={v=>upRate("targetROAS",v)} min={1} max={15} step={0.5} fmt={v=>v+"x"}/>
                <div style={{fontSize:11,color:T.textFaint,fontFamily:MN,marginTop:-4,marginBottom:12}}>Higher ROAS = lower needed marketing budget</div>
                <div style={{background:T.bgDeep,borderRadius:5,padding:"10px 12px",border:`1px solid ${T.border}`}}>
                  <div style={{fontSize:11,color:T.textDim,fontFamily:MN,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>ROAS</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                    <span style={{fontSize:24,fontFamily:SR,color:result.roas>=3?T.green:result.roas>=1.5?T.gold:T.red,fontWeight:700}}>{result.roas.toFixed(2)}x</span>
                    <span style={{fontSize:10,color:T.textDim,fontFamily:MN}}>per $1 marketing</span>
                  </div>
                  {[["Core Marketing",result.budgetLines.marketing],["Orchard Drawdown",scenarioData.orchardDrawdown||0],["Trafalgar P&A",trafPA],["Total Marketing",result.totalMarketing],[`Needed (/${effectiveRates.targetROAS||5} ROAS)`,result.neededMktg],["Album+Merch Gross",result.neededMktg*(effectiveRates.targetROAS||5)]].map(([l,v],i)=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderTop:i===3?`1px solid ${T.border}`:"none",fontFamily:MN,fontSize:fs-2,fontWeight:i>=3?600:400,color:i===5?T.gold:i>=3?T.text:T.textDim}}>
                      <span>{l}</span><span>{fmtD(v)}</span>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </div>
        )}
        {/* == COMPARE TAB == */}
        {tab==="compare"&&(
          <div style={{...card,padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:fs-2,fontFamily:MN,minWidth:1000}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${T.border}`,background:T.bgSub}}>
                    {[
                      {h:"Scenario",  sortKey:null},
                      {h:"Gross",     sortKey:"totalGross"},
                      {h:"NTC",       sortKey:null},
                      {h:"Inv. Principal", sortKey:null},
                      {h:"Inv. Return",   sortKey:"totalInvestorReturn"},
                      {h:"ROI",       sortKey:"investorROI"},
                      {h:"Artist Fee",    sortKey:"artistFeeVal"},
                      {h:"Artist Total",  sortKey:null},
                      {h:"TRM",       sortKey:null},
                      {h:"Net Proceeds",  sortKey:"netProceeds"},
                    ].map(({h,sortKey})=>{
                      const active=compareSort.col===sortKey&&sortKey;
                      const arrow=active?(compareSort.dir===1?"^":"v"):"";
                      return (
                        <th key={h} onClick={sortKey?()=>setCompareSort(p=>p.col===sortKey?{col:sortKey,dir:-p.dir}:{col:sortKey,dir:-1}):undefined}
                          style={{textAlign:h==="Scenario"?"left":"right",padding:"10px 12px",color:active?T.gold:T.textDim,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",whiteSpace:"nowrap",cursor:sortKey?"pointer":"default",userSelect:"none"}}>
                          {h}{arrow&&<span style={{marginLeft:4,fontSize:10}}>{arrow}</span>}
                        </th>
                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {(()=>{
                    let rows=Object.entries(scenarios).map(([name,s])=>{
                      const r=run(s,effectiveRates,budgetPct/100);
                      return {name,s,r,artistFeeVal:s.artistFee||0};
                    });
                    if(compareSort.col){
                      rows.sort((a,b)=>{
                        const av=compareSort.col==="artistFeeVal"?a.artistFeeVal:a.r[compareSort.col]||0;
                        const bv=compareSort.col==="artistFeeVal"?b.artistFeeVal:b.r[compareSort.col]||0;
                        return (av-bv)*compareSort.dir;
                      });
                    }
                    return rows.map(({name,s,r,artistFeeVal})=>(
                      <tr key={name} className="hover-row" onClick={()=>{setSelected(name);setTab("model");}} style={{borderBottom:`1px solid ${T.border}`,cursor:"pointer",background:selected===name?T.goldBg:"transparent"}}>
                        <td style={{padding:"8px 12px",color:selected===name?T.gold:T.text,fontWeight:selected===name?600:400,whiteSpace:"nowrap"}}>{name}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.textMid}}>{fmtD(r.totalGross)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.textMid}}>{fmtD(r.totalNTC)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.textMid}}>{fmtD(r.investorPrincipal)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.gold,fontWeight:600}}>{fmtD(r.totalInvestorReturn)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:r.investorROI>=0?T.green:T.red,fontWeight:700}}>{fmtPct(r.investorROI)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.textDim}}>{fmtD(artistFeeVal)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.textMid}}>{fmtD(r.totalArtistIncome)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:T.textMid}}>{fmtD(r.totalTRMReturn)}</td>
                        <td style={{textAlign:"right",padding:"8px 12px",color:r.netProceeds>0?T.green:T.textDim}}>{fmtD(r.netProceeds)}</td>
                      </tr>
                    ));
                  })()}
                </tbody>
              </table>
            </div>
            <div style={{padding:"8px 12px",fontSize:11,color:T.textFaint,fontFamily:MN,borderTop:`1px solid ${T.border}`}}>Click any row -> full model view . Click column headers to sort</div>
          </div>
        )}

        {/* == WATERFALL TAB == */}
        {tab==="waterfall"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:760}}>
            <div style={{fontFamily:SR,fontSize:21,color:T.gold}}>{selected}</div>
            <div style={card}>
              <div style={slab}>Gross Revenue -> NTC</div>
              {result.revenueBreakdown.map((s,i)=>(
                <div key={s.name} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:6,height:6,borderRadius:2,background:CL[i]}}/><span style={{fontFamily:MN,fontSize:fs-2,fontWeight:500}}>{s.name}</span></div>
                    <div style={{display:"flex",gap:14}}><span style={{fontFamily:MN,fontSize:fs-2,color:T.textDim}}>{fmtD(s.gross)} -> {fmtD(s.net)}</span><span style={{fontFamily:MN,fontSize:fs-2,color:CL[i]}}>{s.gross>0?fmtPct(s.net/s.gross)+" kept":" -- "}</span></div>
                  </div>
                  <div style={{height:5,background:T.bgDeep,borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:result.totalGross>0?(s.gross/result.totalGross*100)+"%":0,height:"100%",background:CL[i]+"30",borderRadius:3,position:"relative"}}>
                      <div style={{width:s.gross>0?(s.net/s.gross*100)+"%":0,height:"100%",background:CL[i],borderRadius:3}}/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={card}>
              <div style={slab}>NTC -> Recoup -> Backend</div>
              <div style={{display:"flex",flexDirection:"column",gap:4,fontFamily:MN,fontSize:fs-2}}>
                {wfRows.map(([l,v,c],i)=>{
                  const isTotal=l.startsWith("="),isArrow=l.startsWith("->");
                  return (
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:isTotal?`1px solid ${T.borderStrong}`:"none",borderBottom:isTotal?`1px solid ${T.borderStrong}`:"none"}}>
                      <span style={{color:(isTotal||isArrow)?c:T.textDim,fontWeight:isTotal?600:400}}>{l}</span>
                      <span style={{color:c,fontWeight:(isTotal||isArrow)?700:400}}>{fmtD(v)}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* == SCENARIOS TAB == */}
        {tab==="scenarios"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontFamily:SR,fontSize:21,color:T.gold}}>All Scenarios</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowBuilder(true)} style={{...btn,padding:"6px 14px",fontSize:12,background:T.goldBg,border:`1px solid ${T.goldBorder}`,color:T.gold}}>+ New Artist</button>
                <button onClick={exportScenariosCSV} style={{...btn,padding:"6px 12px",fontSize:12,background:T.blueBg,border:`1px solid rgba(26,78,138,0.3)`,color:T.blue}}>v Export CSV</button>
                <button onClick={()=>csvImportRef.current?.click()} style={{...btn,padding:"6px 12px",fontSize:12,background:"rgba(26,110,58,0.1)",border:`1px solid rgba(26,110,58,0.3)`,color:T.green}}>^ Import CSV</button>
                <input ref={csvImportRef} type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={e=>{importScenariosCSV(e.target.files?.[0]);e.target.value="";}}/>
                <button onClick={()=>{setScenarios(SEED);setRates({...DR});}} style={{...btn,padding:"6px 12px",fontSize:12,background:T.redBg,border:`1px solid rgba(176,48,48,0.3)`,color:T.red}}>Reset Defaults</button>
              </div>
            </div>
            <div style={{...card,padding:0,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:fs-2,fontFamily:MN,minWidth:900}}>
                  <thead>
                    <tr style={{borderBottom:`2px solid ${T.border}`,background:T.bgSub}}>
                      <th style={{textAlign:"left",padding:"10px 12px",color:T.textDim,fontSize:11,textTransform:"uppercase",position:"sticky",left:0,background:T.bgSub,zIndex:2,minWidth:180}}>Scenario</th>
                      {FIELDS.map(f=><th key={f.k} style={{textAlign:"right",padding:"10px 8px",color:T.textDim,fontSize:11,textTransform:"uppercase",whiteSpace:"nowrap"}}>{f.l}</th>)}
                      <th style={{textAlign:"right",padding:"10px 8px",color:T.gold,fontSize:11,textTransform:"uppercase",whiteSpace:"nowrap"}} title="Per-scenario budget scale. Click lock to override global.">Budget%</th>
                      <th style={{textAlign:"right",padding:"10px 8px",color:T.textDim,fontSize:11,textTransform:"uppercase"}}>ROI</th>
                      <th style={{width:90}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {Object.keys(scenarios).map(name=>{
                      const scn=scenarios[name];
                      const scnBudgetPct=getScenarioBudgetPct(name);
                      const isLocked=scenarioIsLocked(name);
                      const res=run(scn,effectiveRates,scnBudgetPct/100);
                      // -- Flag logic ----------------------------------
                      const orchDD = scn.orchardDrawdown||0;
                      const mktgNeeded = res.neededMktg||0;
                      const coreMktg = res.budgetLines?.marketing||0;
                      const orchOverage = Math.max(0, orchDD - Math.max(0, mktgNeeded - coreMktg));
                      const flags = [];
                      if (orchOverage > 0) flags.push({
                        label:`Orch DD ${fmtD(orchOverage)} over needed`,
                        color:T.orange, tip:`Orchard drawdown exceeds marketing need by ${fmtD(orchOverage)}. Consider reducing to ${fmtD(Math.max(0,orchDD-orchOverage))}.`
                      });
                      if (res.albumMfgOverage>0) flags.push({
                        label:`Album mfg +${fmtD(res.albumMfgOverage)}`,
                        color:T.red, tip:`Album mfg budget exceeds actual needs by ${fmtD(res.albumMfgOverage)}.`
                      });
                      if (res.merchMfgOverage>0) flags.push({
                        label:`Merch mfg +${fmtD(res.merchMfgOverage)}`,
                        color:T.red, tip:`Merch mfg budget exceeds actual needs by ${fmtD(res.merchMfgOverage)}.`
                      });
                      const bk="scnbudget:"+name, editingBudget=editingCell===bk;
                      return (
                        <tr key={name} className="hover-row" style={{borderBottom:`1px solid ${T.border}`}}>
                          <td style={{padding:"6px 12px",position:"sticky",left:0,background:T.bg,zIndex:1}}>
                            <div style={{display:"flex",flexDirection:"column",gap:3}}>
                              <span onClick={()=>{setSelected(name);setTab("model");}} style={{color:selected===name?T.gold:T.text,cursor:"pointer",borderBottom:`1px dashed ${T.border}`,whiteSpace:"nowrap"}}>{name}</span>
                              {flags.length>0&&(
                                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                                  {flags.map((f,i)=>(
                                    <span key={i} title={f.tip} style={{fontSize:9,fontFamily:MN,padding:"1px 5px",borderRadius:3,background:f.color+"18",color:f.color,border:`1px solid ${f.color}33`,cursor:"help",letterSpacing:"0.04em"}}>
                                      ! {f.label}
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>
                          </td>
                          {FIELDS.map(f=>{
                            const ck=name+":"+f.k, editing=editingCell===ck;
                            return (
                              <td key={f.k} style={{textAlign:"right",padding:"5px 8px"}} onClick={()=>{setEditingCell(ck);setEditVal(String(scn[f.k]||"")); }}>
                                {editing?(
                                  <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                                    onBlur={()=>{const n=Number(editVal.replace(/[^0-9.-]/g,""));if(!isNaN(n))setScenarios(p=>({...p,[name]:{...p[name],[f.k]:n}}));setEditingCell(null);}}
                                    onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape")setEditingCell(null);}}
                                    style={{width:90,padding:"2px 5px",background:T.goldBg,border:`1px solid ${T.goldBorder}`,borderRadius:3,color:T.gold,fontFamily:MN,fontSize:fs-2,textAlign:"right",outline:"none"}}/>
                                ):(
                                  <span style={{color:T.textMid,cursor:"pointer",borderBottom:`1px dashed ${T.border}`,paddingBottom:1}}>{f.fmt(scn[f.k])}</span>
                                )}
                              </td>
                            );
                          })}
                          {/* Per-scenario Budget% column */}
                          <td style={{textAlign:"right",padding:"5px 8px"}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5}}>
                              {editingBudget?(
                                <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                                  onBlur={()=>{const n=Number(editVal.replace(/[^0-9]/g,""));if(n>=10&&n<=100){setScenarioBudgetPct(name,n);}setEditingCell(null);}}
                                  onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape")setEditingCell(null);}}
                                  style={{width:44,padding:"2px 4px",background:T.goldBg,border:`1px solid ${T.goldBorder}`,borderRadius:3,color:T.gold,fontFamily:MN,fontSize:fs-2,textAlign:"right",outline:"none"}}/>
                              ):(
                                <span onClick={()=>{setEditingCell(bk);setEditVal(String(scnBudgetPct));}}
                                  style={{color:isLocked?T.gold:T.textDim,cursor:"pointer",fontFamily:MN,fontSize:fs-2}}>
                                  {scnBudgetPct}%
                                </span>
                              )}
                              <span
                                onClick={()=>isLocked?clearScenarioBudget(name):setScenarioBudgetPct(name,scnBudgetPct)}
                                title={isLocked?"Click to unlock  --  revert to global budget":"Click to lock this budget to scenario"}
                                style={{cursor:"pointer",fontSize:9,padding:"2px 7px",borderRadius:8,fontFamily:MN,fontWeight:700,letterSpacing:"0.05em",
                                  background:isLocked?T.gold:"transparent",
                                  color:isLocked?"#fff":T.textFaint,
                                  border:`1px solid ${isLocked?T.gold:T.border}`}}>
                                {isLocked?"LOCKED":"GLOBAL"}
                              </span>
                            </div>
                          </td>
                          <td style={{textAlign:"right",padding:"5px 8px",color:res.investorROI>=0?T.green:T.red,fontWeight:700}}>{fmtPct(res.investorROI)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",whiteSpace:"nowrap"}}>
                            <button onClick={()=>duplicateScenario(name)} style={{...btn,padding:"2px 7px",background:"transparent",color:T.blue,fontSize:15}} title="Duplicate">+</button>
                            <button onClick={()=>deleteScenario(name)} style={{...btn,padding:"2px 7px",background:confirmDelete===name?T.redBg:"transparent",color:T.red,fontSize:14,marginLeft:3}}>{confirmDelete===name?"sure?":"x"}</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{padding:"8px 12px",fontSize:11,color:T.textFaint,fontFamily:MN,borderTop:`1px solid ${T.border}`}}>Click value to edit inline . Click name -> Model view . + duplicate . x delete (twice) . Hover flag badges for details</div>
            </div>
          </div>
        )}
      </div>

      {/* == BACKEND TAB == */}
      {tab==="backend"&&(
        <div style={{padding:"0 20px 40px"}}>
          <BackendTab s={scenarioData} r={effectiveRates} budgetPct={Object.keys(budgetLineEdits).length>0?100:budgetPct} royaltyTopLine={royaltyTopLine} onToggleRoyalty={()=>setRoyaltyTopLine(v=>!v)}/>
        </div>
      )}

      {showBuilder&&<ProjectionsBuilder
  onSave={(name,data)=>{saveScenario(name,data);}}
  onCancel={()=>setShowBuilder(false)}
/>}
    </div>
  );
}

// -- Mount --
const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(TheRoundModel));
  </script>
</body>
</html>
